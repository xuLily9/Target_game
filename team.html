<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Team Decision Sheet | Construction Site of the Future</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
    <style>
      body {
        min-height: 100vh;
        display: grid;
        place-items: center;
        margin: 0;
        background: linear-gradient(180deg, #f7fbff 0%, #eaf4ff 100%);
        color: var(--ink);
      }

      .team-setup-page {
        width: min(820px, calc(100% - 32px));
        margin: 0 auto;
        padding: 32px 0;
      }

      .team-setup-card {
        padding: 28px;
        border: 1px solid rgba(31, 90, 204, 0.18);
        background: rgba(255, 255, 255, 0.96);
        box-shadow: 0 20px 50px rgba(31, 90, 204, 0.08);
      }

      .decision-sheet-title {
        margin: 0;
        font-family: "Space Grotesk", sans-serif;
      }

      .team-setup-form {
        display: grid;
        gap: 16px;
        margin-top: 22px;
      }

      .team-setup-form label {
        display: grid;
        gap: 8px;
        color: var(--muted);
      }

      .team-setup-form input {
        width: 100%;
        border: 1px solid rgba(31, 90, 204, 0.22);
        border-radius: 8px;
        background: #f4f8ff;
        color: var(--ink);
        padding: 12px 14px;
        font: inherit;
      }

      .role-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 14px;
      }

      .team-setup-actions {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        margin-top: 22px;
      }

      .team-setup-actions .button.primary {
        background: var(--accent);
        color: #fff;
      }

      .team-setup-actions .button.ghost {
        background: rgba(233, 241, 255, 0.92);
        color: var(--ink);
        border: 1px solid rgba(31, 90, 204, 0.16);
      }

      .team-feedback,
      .created-teams {
        margin-top: 18px;
      }

      .created-team-list {
        display: grid;
        gap: 8px;
        margin-top: 10px;
      }

      .created-team-row {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: center;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 10px 12px;
        background: var(--panel-strong);
      }

      .created-team-actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        justify-content: flex-end;
      }

      @media (max-width: 720px) {
        .role-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="team-setup-page">
      <section class="panel team-setup-card">
        <div class="panel-head">
          <p class="panel-kicker">Construction Site of the Future</p>
          <h1 class="decision-sheet-title">Team Decision Sheet</h1>
        </div>

        <p class="microcopy">
          Create or select a numeric Team ID first. Each team will submit Round 1 and Round 2 once; final submissions are locked.
        </p>

        <form id="team-form" class="team-setup-form">
          <label>
            Team ID
            <input id="team-id" type="number" min="1" step="1" placeholder="1" required />
          </label>

          <div class="role-grid">
            <label>
              Architecture Lead
              <input id="architecture-lead" type="text" placeholder="Optional name" />
            </label>

            <label>
              Robot Engineer
              <input id="robot-engineer" type="text" placeholder="Optional name" />
            </label>

            <label>
              Cost Manager
              <input id="cost-manager" type="text" placeholder="Optional name" />
            </label>
          </div>

          <label>
            Workshop Session
            <input id="session-id" type="text" placeholder="Optional session code" />
          </label>

          <div class="team-setup-actions">
            <button class="button primary" type="submit">Start Planning</button>
            <button id="new-team" class="button ghost" type="button">Next New Team ID</button>
            <a class="button ghost" href="./index.html">Return to Game</a>
          </div>
        </form>

        <div id="team-feedback" class="team-feedback"></div>
        <div id="database-status" class="team-feedback"></div>
        <div id="created-teams" class="created-teams"></div>
      </section>
    </main>

    <script src="./database-config.js?v=2"></script>
    <script src="./database.js?v=2"></script>
    <script>
      const WORKSHOP_TEAMS_KEY = "construction-workshop-teams-v4";
      const ACTIVE_TEAM_ID_KEY = "construction-workshop-active-team-id-v4";
      const SESSION_TEAM_ID_KEY = "construction-workshop-session-team-id-v4";

      const form = document.getElementById("team-form");
      const teamIdInput = document.getElementById("team-id");
      const architectureLeadInput = document.getElementById("architecture-lead");
      const robotEngineerInput = document.getElementById("robot-engineer");
      const costManagerInput = document.getElementById("cost-manager");
      const sessionInput = document.getElementById("session-id");
      const feedbackEl = document.getElementById("team-feedback");
      const databaseStatusEl = document.getElementById("database-status");
      const createdTeamsEl = document.getElementById("created-teams");
      const newTeamButton = document.getElementById("new-team");
      let teamsCache = loadJSON(WORKSHOP_TEAMS_KEY, []);
      let lastTeamsSnapshot = JSON.stringify(teamsCache);

      function loadJSON(key, fallback) {
        try {
          const raw = localStorage.getItem(key);
          return raw ? JSON.parse(raw) : fallback;
        } catch {
          return fallback;
        }
      }

      function saveTeams(teams) {
        teamsCache = [...teams].sort((a, b) => Number(a.teamId) - Number(b.teamId));
        lastTeamsSnapshot = JSON.stringify(teamsCache);
        localStorage.setItem(WORKSHOP_TEAMS_KEY, lastTeamsSnapshot);
      }

      function getTeams() {
        return teamsCache;
      }

      function applyRemoteTeams(teams) {
        const nextTeams = [...teams].sort((a, b) => Number(a.teamId) - Number(b.teamId));
        const snapshot = JSON.stringify(nextTeams);
        if (snapshot === lastTeamsSnapshot) return false;
        teamsCache = nextTeams;
        lastTeamsSnapshot = snapshot;
        localStorage.setItem(WORKSHOP_TEAMS_KEY, snapshot);
        return true;
      }

      async function saveTeamToDatabase(team) {
        if (!window.WorkshopDatabase?.isEnabled()) {
          throw new Error("Shared database is not configured.");
        }
        await window.WorkshopDatabase.upsertTeam(team);
      }

      function renderDatabaseStatus(message, status = "info") {
        const className = status === "error" ? "warning-pill" : "role-pill";
        databaseStatusEl.innerHTML = `<div class="${className}">${message}</div>`;
      }

      function getNextTeamId() {
        const maxId = getTeams().reduce((max, team) => Math.max(max, Number(team.teamId) || 0), 0);
        return String(maxId + 1);
      }

      function collectTeamInfo(existing = {}) {
        const architectureLead = architectureLeadInput.value.trim();
        const robotEngineer = robotEngineerInput.value.trim();
        const costManager = costManagerInput.value.trim();
        return {
          ...existing,
          sessionId: sessionInput.value.trim(),
          teamId: String(Number(teamIdInput.value)),
          teamName: `Team ${Number(teamIdInput.value)}`,
          architectureLead,
          robotEngineer,
          costManager,
          participants: [architectureLead, robotEngineer, costManager].filter(Boolean).join(", "),
          createdAt: existing.createdAt || new Date().toISOString(),
          updatedAt: new Date().toISOString(),
        };
      }

      function fillExistingTeam() {
        const activeTeamId = localStorage.getItem(ACTIVE_TEAM_ID_KEY);
        const saved = getTeams().find((team) => String(team.teamId) === String(activeTeamId));
        if (!saved) return;
        teamIdInput.value = saved.teamId || "";
        architectureLeadInput.value = saved.architectureLead || "";
        robotEngineerInput.value = saved.robotEngineer || "";
        costManagerInput.value = saved.costManager || "";
        sessionInput.value = saved.sessionId || "";
        if (saved.teamId) {
          feedbackEl.innerHTML = `<div class="role-pill">Current active team: Team ${saved.teamId}</div>`;
        }
      }

      async function saveTeam(teamInfo) {
        const teams = getTeams();
        const nextTeams = [teamInfo, ...teams.filter((team) => String(team.teamId) !== String(teamInfo.teamId))].sort(
          (a, b) => Number(a.teamId) - Number(b.teamId)
        );
        saveTeams(nextTeams);
        await saveTeamToDatabase(teamInfo);
        localStorage.setItem(ACTIVE_TEAM_ID_KEY, String(teamInfo.teamId));
        try {
          sessionStorage.setItem(SESSION_TEAM_ID_KEY, String(teamInfo.teamId));
        } catch {
          // URL links still identify team pages if session storage is unavailable.
        }
      }

      function renderCreatedTeams() {
        const teams = getTeams();
        if (!teams.length) {
          createdTeamsEl.innerHTML = "";
          return;
        }
        createdTeamsEl.innerHTML = `
          <div class="panel-kicker">Created Teams</div>
          <div class="created-team-list">
            ${teams
              .map(
                (team) => `
                  <div class="created-team-row">
                    <div>
                      <strong>Team ${team.teamId}</strong>
                      <div class="microcopy">${team.architectureLead || "-"} / ${team.robotEngineer || "-"} / ${team.costManager || "-"}</div>
                      <div class="microcopy">${getTeamProgress(team)}</div>
                    </div>
                    <div class="created-team-actions">
                      <a class="button ghost" href="${getTeamGameUrl(team.teamId)}" target="_blank" rel="noopener">Open Page</a>
                      <button class="button ghost" data-team-id="${team.teamId}" type="button">Use Here</button>
                    </div>
                  </div>
                `
              )
              .join("")}
          </div>
        `;
        createdTeamsEl.querySelectorAll("[data-team-id]").forEach((button) => {
          button.addEventListener("click", () => {
            const selected = teams.find((team) => String(team.teamId) === String(button.dataset.teamId));
            if (!selected) return;
            localStorage.setItem(ACTIVE_TEAM_ID_KEY, String(selected.teamId));
            try {
              sessionStorage.setItem(SESSION_TEAM_ID_KEY, String(selected.teamId));
            } catch {
              // Ignore; URL below carries the team id.
            }
            window.location.href = getTeamGameUrl(selected.teamId);
          });
        });
      }

      function getTeamGameUrl(teamId) {
        return `./index.html?team=${encodeURIComponent(teamId)}#planning-workspace`;
      }

      function getTeamProgress(team) {
        if (team.round2Submission) return "Round 1 submitted | Round 2 submitted";
        if (team.round1Submission) return "Round 1 submitted | Round 2 open";
        return "No submissions yet";
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        const numericTeamId = Number(teamIdInput.value);

        if (!Number.isInteger(numericTeamId) || numericTeamId <= 0) {
          feedbackEl.innerHTML = `<div class="warning-pill">Please enter a positive numeric Team ID.</div>`;
          return;
        }

        const existing = getTeams().find((team) => String(team.teamId) === String(numericTeamId)) || {};
        const teamInfo = collectTeamInfo(existing);
        try {
          await saveTeam(teamInfo);
        } catch (error) {
          feedbackEl.innerHTML = `<div class="warning-pill">Database save failed: ${error.message}</div>`;
          console.warn(error);
          return;
        }
        window.location.href = getTeamGameUrl(teamInfo.teamId);
      });

      newTeamButton.addEventListener("click", () => {
        teamIdInput.value = getNextTeamId();
        architectureLeadInput.value = "";
        robotEngineerInput.value = "";
        costManagerInput.value = "";
        sessionInput.value = "";
        feedbackEl.innerHTML = "";
        teamIdInput.focus();
      });

      async function startTeamSetup() {
        if (window.WorkshopDatabase?.isEnabled()) {
          try {
            const remoteTeams = await window.WorkshopDatabase.loadTeams();
            applyRemoteTeams(remoteTeams);
            renderDatabaseStatus("Shared database connected.");
          } catch (error) {
            renderDatabaseStatus(`Shared database connection failed: ${error.message}`, "error");
            console.warn(error);
          }
        } else {
          renderDatabaseStatus("Local-only mode: database config was not loaded.", "error");
        }

        if (!teamIdInput.value) {
          teamIdInput.value = getNextTeamId();
        }
        fillExistingTeam();
        renderCreatedTeams();

        window.WorkshopDatabase?.startPolling?.(
          (remoteTeams) => {
            if (applyRemoteTeams(remoteTeams)) {
              renderCreatedTeams();
            }
          },
          (error) => console.warn(error)
        );
      }

      startTeamSetup();
    </script>
  </body>
</html>
