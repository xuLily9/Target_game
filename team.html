<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Team Decision Sheet | Construction Site of the Future</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
    <style>
      body {
        min-height: 100vh;
        display: grid;
        place-items: center;
      }

      .team-setup-page {
        width: min(820px, calc(100% - 32px));
        margin: 0 auto;
        padding: 32px 0;
      }

      .team-setup-card {
        padding: 28px;
      }

      .decision-sheet-title {
        margin: 0;
        font-family: "Space Grotesk", sans-serif;
      }

      .team-setup-form {
        display: grid;
        gap: 16px;
        margin-top: 22px;
      }

      .team-setup-form label {
        display: grid;
        gap: 8px;
        color: var(--muted);
      }

      .team-setup-form input {
        width: 100%;
        border: 1px solid rgba(16, 37, 66, 0.16);
        border-radius: 8px;
        background: #fff;
        color: var(--ink);
        padding: 12px 14px;
        font: inherit;
      }

      .role-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 14px;
      }

      .team-setup-actions {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        margin-top: 22px;
      }

      .team-feedback,
      .created-teams {
        margin-top: 18px;
      }

      .created-team-list {
        display: grid;
        gap: 8px;
        margin-top: 10px;
      }

      .created-team-row {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: center;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 10px 12px;
        background: var(--panel-strong);
      }

      @media (max-width: 720px) {
        .role-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="team-setup-page">
      <section class="panel team-setup-card">
        <div class="panel-head">
          <p class="panel-kicker">Construction Site of the Future</p>
          <h1 class="decision-sheet-title">Team Decision Sheet</h1>
        </div>

        <p class="microcopy">
          Create a team first. Team names are entered freely because the workshop may have any number of teams.
        </p>

        <form id="team-form" class="team-setup-form">
          <label>
            Team Name
            <input id="team-name" type="text" placeholder="Enter your team name" required />
          </label>

          <div class="role-grid">
            <label>
              Architecture Lead
              <input id="architecture-lead" type="text" placeholder="Name" required />
            </label>

            <label>
              Robot Engineer
              <input id="robot-engineer" type="text" placeholder="Name" required />
            </label>

            <label>
              Cost Manager
              <input id="cost-manager" type="text" placeholder="Name" required />
            </label>
          </div>

          <label>
            Workshop Session
            <input id="session-id" type="text" placeholder="Optional session code" />
          </label>

          <div class="team-setup-actions">
            <button class="button primary" type="submit">Start Game</button>
            <button id="new-team" class="button ghost" type="button">New Blank Team</button>
          </div>
        </form>

        <div id="team-feedback" class="team-feedback"></div>
        <div id="created-teams" class="created-teams"></div>
      </section>
    </main>

    <script>
      const TEAM_STORAGE_KEY = "construction-site-team-v1";
      const TEAM_LIST_STORAGE_KEY = "construction-site-teams-v1";

      const form = document.getElementById("team-form");
      const teamNameInput = document.getElementById("team-name");
      const architectureLeadInput = document.getElementById("architecture-lead");
      const robotEngineerInput = document.getElementById("robot-engineer");
      const costManagerInput = document.getElementById("cost-manager");
      const sessionInput = document.getElementById("session-id");
      const feedbackEl = document.getElementById("team-feedback");
      const createdTeamsEl = document.getElementById("created-teams");
      const newTeamButton = document.getElementById("new-team");

      function loadJSON(key, fallback) {
        try {
          const raw = localStorage.getItem(key);
          return raw ? JSON.parse(raw) : fallback;
        } catch {
          return fallback;
        }
      }

      function generateTeamId() {
        if (typeof crypto !== "undefined" && typeof crypto.randomUUID === "function") {
          return crypto.randomUUID();
        }
        return `team-${Date.now()}-${Math.floor(Math.random() * 10000)}`;
      }

      function collectTeamInfo(existing = {}) {
        const architectureLead = architectureLeadInput.value.trim();
        const robotEngineer = robotEngineerInput.value.trim();
        const costManager = costManagerInput.value.trim();
        return {
          ...existing,
          sessionId: sessionInput.value.trim(),
          teamName: teamNameInput.value.trim(),
          architectureLead,
          robotEngineer,
          costManager,
          participants: [architectureLead, robotEngineer, costManager].filter(Boolean).join(", "),
          teamId: existing.teamId || generateTeamId(),
          finalSubmitted: existing.finalSubmitted || false,
        };
      }

      function fillExistingTeam() {
        const saved = loadJSON(TEAM_STORAGE_KEY, null);
        if (!saved) return;
        teamNameInput.value = saved.teamName || "";
        architectureLeadInput.value = saved.architectureLead || "";
        robotEngineerInput.value = saved.robotEngineer || "";
        costManagerInput.value = saved.costManager || "";
        sessionInput.value = saved.sessionId || "";
        if (saved.teamName) {
          feedbackEl.innerHTML = `<div class="role-pill">Current saved team: ${saved.teamName}</div>`;
        }
      }

      function saveTeam(teamInfo) {
        localStorage.setItem(TEAM_STORAGE_KEY, JSON.stringify(teamInfo));
        const teams = loadJSON(TEAM_LIST_STORAGE_KEY, []);
        const nextTeams = [teamInfo, ...teams.filter((team) => team.teamId !== teamInfo.teamId)];
        localStorage.setItem(TEAM_LIST_STORAGE_KEY, JSON.stringify(nextTeams));
      }

      function renderCreatedTeams() {
        const teams = loadJSON(TEAM_LIST_STORAGE_KEY, []);
        if (!teams.length) {
          createdTeamsEl.innerHTML = "";
          return;
        }
        createdTeamsEl.innerHTML = `
          <div class="panel-kicker">Created Teams</div>
          <div class="created-team-list">
            ${teams
              .map(
                (team) => `
                  <div class="created-team-row">
                    <div>
                      <strong>${team.teamName}</strong>
                      <div class="microcopy">${team.architectureLead || "-"} / ${team.robotEngineer || "-"} / ${team.costManager || "-"}</div>
                    </div>
                    <button class="button ghost" data-team-id="${team.teamId}" type="button">Use</button>
                  </div>
                `
              )
              .join("")}
          </div>
        `;
        createdTeamsEl.querySelectorAll("[data-team-id]").forEach((button) => {
          button.addEventListener("click", () => {
            const selected = teams.find((team) => team.teamId === button.dataset.teamId);
            if (!selected) return;
            localStorage.setItem(TEAM_STORAGE_KEY, JSON.stringify(selected));
            window.location.href = "./index.html";
          });
        });
      }

      form.addEventListener("submit", (event) => {
        event.preventDefault();
        const existing = loadJSON(TEAM_STORAGE_KEY, {});
        const teamInfo = collectTeamInfo(existing.teamName === teamNameInput.value.trim() ? existing : {});

        if (!teamInfo.teamName || !teamInfo.architectureLead || !teamInfo.robotEngineer || !teamInfo.costManager) {
          feedbackEl.innerHTML = `<div class="warning-pill">Please fill Team Name, Architecture Lead, Robot Engineer, and Cost Manager.</div>`;
          return;
        }

        saveTeam(teamInfo);
        window.location.href = "./index.html";
      });

      newTeamButton.addEventListener("click", () => {
        localStorage.removeItem(TEAM_STORAGE_KEY);
        teamNameInput.value = "";
        architectureLeadInput.value = "";
        robotEngineerInput.value = "";
        costManagerInput.value = "";
        sessionInput.value = "";
        feedbackEl.innerHTML = "";
        teamNameInput.focus();
      });

      fillExistingTeam();
      renderCreatedTeams();
    </script>
  </body>
</html>
